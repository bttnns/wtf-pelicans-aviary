name: validate lessons

# Self-validating PR CI: checks every lesson against the Pelican Ground School
# rules WITHOUT needing the private site code. The site build is still the
# authoritative gate (it also verifies art ids exist in illustrations.json);
# this gives contributors fast, local-style feedback on a PR.

on:
  pull_request:
    paths:
      - "lessons/**"
      - "validate/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum
      # A small, fast Go program (one tiny YAML dependency, no network). It
      # prints non-blocking WARNINGS (order gaps/dupes, unknown frontmatter
      # keys, empty :::sources, template drift, unwired slugs) to the log, and
      # only exits non-zero on a hard rule violation, so leftovers surface
      # without failing the PR. Same command you can run locally.
      - name: Validate lessons
        run: go run ./validate
